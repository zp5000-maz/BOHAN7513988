<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>博瀚 AI 英語 V56.3</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --success: #00ffbb; --danger: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: #111; padding: 25px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; margin-top: 12px; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--primary); color: #000; }
        .btn-d { background: #222; color: #fff; border: 1px solid #444; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px; box-sizing: border-box; }
        #wave { width: 100%; height: 50px; background: #000; border-radius: 10px; margin: 15px 0; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-ui">
        <h2 style="color:var(--primary); margin-bottom:20px;">博瀚 AI 英語V56.3</h2>
        <input type="text" id="user" placeholder="學生姓名">
        <input type="password" id="pass" placeholder="密碼">
        <button class="btn btn-p" onclick="doLogin()">進入學習</button>
    </div>

    <div id="main-ui" class="hidden">
        <div id="q-eng" style="font-size: 22px; color: #ffc107; font-weight: bold; margin-bottom: 8px; min-height: 50px;"></div>
        <div id="q-chi" style="opacity: 0.6; font-size: 16px; margin-bottom: 15px;"></div>
        <div id="score" style="font-size: 70px; font-weight: 900; color: var(--success); line-height: 1;">0</div>
        <canvas id="wave"></canvas>
        <button id="play-btn" class="btn btn-d" onclick="sayIt()">🔊 聽範例聲音</button>
        <button id="rec-btn" class="btn btn-d" style="color:var(--success)" onclick="runRec()">🎙️ 按我錄音</button>
        <button id="next-btn" class="btn btn-p" style="background: #0084a5; color: white;" onclick="nextQ()" disabled>儲存並下一題 ➔</button>
    </div>
</div>

<script>
    // ⚠️ 請務必替換為你的 GAS 網址
    const API = "https://script.google.com/macros/s/AKfycbzeJyLP-S2lPYKnlf9HPk25Ynb-xCKdVT5CuBWFMgw7JQitBxPB3fTF2FhIorNi0FcKaw/exec"; 
    let db={users:[],questions:[]}, stu="", cur=0, isRec=false, mr, chunks=[], audioCtx, ana, aniId;

    window.onload = async () => { 
        try { const r = await fetch(API); db = await r.json(); } 
        catch(e) { console.log("初始化失敗"); } 
    };

    function doLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if (db.users.some(x => x[0] === u && x[1] === p)) {
            stu = u; 
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden'); 
            showQ();
        } else alert("姓名或密碼不正確");
    }

    function showQ() {
        const q = db.questions[cur];
        document.getElementById('q-eng').innerText = q.eng;
        document.getElementById('q-chi').innerText = q.chi;
        document.getElementById('score').innerText = "0";
        document.getElementById('next-btn').disabled = true;
        document.getElementById('next-btn').innerText = "儲存並下一題 ➔";
    }

    function sayIt() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(db.questions[cur].eng);
        u.lang = 'en-US'; 
        u.rate = 0.8; // 稍微慢一點讓學生聽清楚
        window.speechSynthesis.speak(u);
    }

    function draw() {
        if (!isRec) return;
        aniId = requestAnimationFrame(draw);
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteFrequencyData(data);
        const cvs = document.getElementById('wave'), ctx = cvs.getContext('2d');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
        const bw = cvs.width / 25;
        for (let i = 0; i < 25; i++) {
            const h = (data[i] / 255) * cvs.height * 1.3;
            ctx.fillStyle = `hsl(${180 + i * 4}, 100%, 50%)`;
            ctx.fillRect(i * bw, cvs.height - h, bw - 2, h);
        }
    }

    async function runRec() {
        if (!isRec) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                
                ana = audioCtx.createAnalyser(); 
                ana.fftSize = 64;
                audioCtx.createMediaStreamSource(s).connect(ana);

                // iPhone 支援偵測
                const mime = ["audio/webm", "audio/mp4", "audio/aac"].find(t => MediaRecorder.isTypeSupported(t)) || "";
                
                mr = new MediaRecorder(s, { mimeType: mime });
                chunks = [];
                mr.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                mr.onstop = async () => {
                    const blob = new Blob(chunks, { type: mime || 'audio/mp4' });
                    s.getTracks().forEach(t => t.stop());
                    
                    if (blob.size < 2000) {
                        alert("錄音時間太短，請再試一次");
                        resetBtn();
                        return;
                    }

                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        document.getElementById('rec-btn').innerText = "🤖 AI 辨識中...";
                        try {
                            const r = await fetch(API, { 
                                method: 'POST', 
                                body: JSON.stringify({ action: 'recognize', audio: base64, mimeType: mime }) 
                            });
                            const res = await r.json();
                            handleResult(res.transcript);
                        } catch (e) { 
                            alert("辨識失敗，請檢查網路"); 
                            resetBtn();
                        }
                    };
                };

                mr.start();
                isRec = true;
                draw();
                document.getElementById('rec-btn').innerText = "⏹ 停止錄音";
                document.getElementById('rec-btn').style.color = "var(--danger)";
            } catch (e) { alert("無法啟動麥克風：" + e.message); }
        } else {
            isRec = false;
            cancelAnimationFrame(aniId);
            mr.stop();
            document.getElementById('rec-btn').disabled = true;
        }
    }

    function resetBtn() {
        document.getElementById('rec-btn').disabled = false;
        document.getElementById('rec-btn').innerText = "🎙️ 按我錄音";
        document.getElementById('rec-btn').style.color = "var(--success)";
    }

    function handleResult(txt) {
        resetBtn();
        if (!txt || txt === "EMPTY" || txt.startsWith("ERROR")) { 
            alert("沒聽到聲音喔，請靠近麥克風再試一次！"); 
            return; 
        }

        const target = db.questions[cur].eng.toLowerCase().replace(/[.,!?]/g,"").split(" ");
        const spoken = txt.toLowerCase().replace(/[.,!?]/g,"").split(" ");
        let match = 0;
        target.forEach(w => { if(spoken.includes(w)) match++; });
        
        let score = Math.floor((match / target.length) * 100); // 改為百分制更直觀
        document.getElementById('score').innerText = score;
        document.getElementById('next-btn').disabled = false;
        window.lastTxt = txt;

        // 彈出老師預設的評語
        if (score >= 90) alert("太厲害了，好棒棒！");
        else if (score >= 60) alert("還不錯喔，再加油。");
        else alert("請認真學習。");
    }

    function nextQ() {
        // 非同步上傳成績，不擋住切換下一題
        fetch(API, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ 
                student: stu, 
                eng: db.questions[cur].eng, 
                score: document.getElementById('score').innerText, 
                recognizedText: window.lastTxt 
            }) 
        });

        if (cur < db.questions.length - 1) { 
            cur++; 
            showQ(); 
        } else {
            alert("恭喜你！全部題目都練習完畢了！");
            location.reload(); // 重回登入頁
        }
    }
</script>
</body>
</html>
