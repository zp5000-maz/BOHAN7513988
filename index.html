<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>博瀚 AI 英語 V56.4</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --success: #00ffbb; --danger: #ff4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: #111; padding: 25px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .btn-p { background: var(--primary); color: #000; }
        .btn-d { background: #222; color: #fff; border: 1px solid #444; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; }
        #wave { width: 100%; height: 50px; background: #000; border-radius: 10px; margin: 15px 0; border: 1px solid #222; }
    </style>
</head>
<body>
<div class="card">
    <div id="login-ui">
        <h2 style="color:var(--primary)">博瀚 AI 英語</h2>
        <input type="text" id="user" placeholder="學生姓名">
        <input type="password" id="pass" placeholder="密碼">
        <button class="btn btn-p" onclick="doLogin()">進入學習</button>
    </div>
    <div id="main-ui" class="hidden">
        <div id="q-eng" style="font-size: 22px; color: #ffc107; font-weight: bold; min-height: 50px;"></div>
        <div id="q-chi" style="opacity: 0.6; margin-bottom: 15px;"></div>
        <div id="score" style="font-size: 70px; font-weight: 900; color: var(--success);">0</div>
        <canvas id="wave"></canvas>
        <button id="play-btn" class="btn btn-d" onclick="sayIt()">🔊 聽範例聲音</button>
        <button id="rec-btn" class="btn btn-d" style="color:var(--success)" onclick="runRec()">🎙️ 按我錄音</button>
        <button id="next-btn" class="btn btn-p" onclick="nextQ()" disabled>儲存並下一題 ➔</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw_94TZkeCtiKLwAG0u7aVhhTyqgQ-RcYbMKMXcZWJcz9wrTX7PzuGWxlGMaLdSoBisYg/exec"; // ⚠️ 請更換網址
    let db={users:[],questions:[]}, stu="", cur=0, isRec=false, mr, chunks=[], audioCtx, ana, aniId;

    window.onload = async () => { try { const r = await fetch(API); db = await r.json(); } catch(e) {} };

    function doLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if (db.users.some(x => x[0] === u && x[1] === p)) {
            stu = u; document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden'); showQ();
        } else alert("姓名或密碼錯誤");
    }

    function showQ() {
        const q = db.questions[cur];
        document.getElementById('q-eng').innerText = q.eng;
        document.getElementById('q-chi').innerText = q.chi;
        document.getElementById('score').innerText = "0";
        document.getElementById('next-btn').disabled = true;
    }

    function sayIt() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(db.questions[cur].eng);
        u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }

    function draw() {
        if (!isRec) return;
        aniId = requestAnimationFrame(draw);
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteFrequencyData(data);
        const cvs = document.getElementById('wave'), ctx = cvs.getContext('2d');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
        for (let i = 0; i < 25; i++) {
            const h = (data[i] / 255) * cvs.height * 1.3;
            ctx.fillStyle = `hsl(${180 + i * 4}, 100%, 50%)`;
            ctx.fillRect(i * (cvs.width/25), cvs.height - h, (cvs.width/25)-2, h);
        }
    }

    async function runRec() {
        if (!isRec) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ana = audioCtx.createAnalyser(); ana.fftSize = 64;
                audioCtx.createMediaStreamSource(s).connect(ana);
                const mime = ["audio/mp4", "audio/webm"].find(t => MediaRecorder.isTypeSupported(t));
                mr = new MediaRecorder(s, { mimeType: mime });
                chunks = []; mr.ondataavailable = e => chunks.push(e.data);
                mr.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/mp4' });
                    s.getTracks().forEach(t => t.stop());
                    if (blob.size < 2000) { alert("錄音失敗，請大聲一點"); resetBtn(); return; }
                    const reader = new FileReader(); reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        document.getElementById('rec-btn').innerText = "🤖 辨識中...";
                        try {
                            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'recognize', audio: base64 }) });
                            const res = await r.json(); handleResult(res.transcript);
                        } catch (e) { alert("連線超時"); resetBtn(); }
                    };
                };
                mr.start(); isRec = true; draw();
                document.getElementById('rec-btn').innerText = "⏹ 停止錄音";
                document.getElementById('rec-btn').style.color = "var(--danger)";
            } catch (e) { alert("請開啟麥克風權限"); }
        } else { isRec = false; cancelAnimationFrame(aniId); mr.stop(); document.getElementById('rec-btn').disabled = true; }
    }

    function resetBtn() {
        document.getElementById('rec-btn').disabled = false;
        document.getElementById('rec-btn').innerText = "🎙️ 按我錄音";
        document.getElementById('rec-btn').style.color = "var(--success)";
    }

    function handleResult(txt) {
        resetBtn();
        if (!txt || txt === "EMPTY" || txt === "ERROR") { alert("沒聽到聲音喔"); return; }
        const clean = (s) => s.toLowerCase().replace(/[.,!?]/g,"").trim();
        const targetWords = clean(db.questions[cur].eng).split(/\s+/);
        const spokenWords = clean(txt).split(/\s+/);
        let match = 0;
        targetWords.forEach(t => { if (spokenWords.some(s => s.includes(t) || t.includes(s))) match++; });
        
        let raw = (match / targetWords.length) * 100;
        let score = raw >= 80 ? 100 : (raw >= 50 ? 85 : (raw >= 20 ? 65 : 40)); // 寬容評分
        
        document.getElementById('score').innerText = score;
        document.getElementById('next-btn').disabled = false;
        window.lastTxt = txt;
        if (score >= 90) alert("太厲害了，好棒棒！");
        else if (score >= 60) alert("還不錯喔，再加油。");
        else alert("請認真學習。");
    }

    function nextQ() {
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ student: stu, eng: db.questions[cur].eng, score: document.getElementById('score').innerText, recognizedText: window.lastTxt }) });
        if (cur < db.questions.length - 1) { cur++; showQ(); } else { alert("練習完畢！"); location.reload(); }
    }
</script>
</body>
</html>
